name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10/3.11 keep stdlib distutils (setup.py uses distutils.core)
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: python -m pip install --upgrade pip setuptools numpy pytest

      # pygds (C extension) is a build-time + run-time dependency, not on PyPI.
      - name: Install pygds
        run: pip install git+https://github.com/CoreArray/pygds.git

      - name: Build & install PySeqArray (C extension)
        run: pip install --no-build-isolation .

      - name: Run tests
        run: pytest tests/ -v
